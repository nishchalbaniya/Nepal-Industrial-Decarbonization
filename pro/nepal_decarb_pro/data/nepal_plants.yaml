# Nepali Cement Plant Registry
# =================================
# Public reference data on operational cement plants in Nepal.
# Sources: Department of Industry (DoI), CEMENT MANUFACTURERS ASSOCIATION OF NEPAL (CMAN),
#          annual reports, public plant records, news, Infomerics Nepal rating 2025.
# Last updated: 2026-07-21
# Maintainer: N. Baniya, himalayancarbonnepal.com
# Note: capacity figures are NAMEPLATE in TPD (tonnes per day) for clinker.
#       Annual production in t/yr assumes 330 operating days (~90% utilization).

meta:
  last_updated: "2026-07-21"
  version: "2.0"
  maintainer: "Nishchal Baniya <nishchal.baniya@himalayancarbonnepal.com>"
  source_quality: "Mixed: official reports + rating agency + news. Cross-verified where possible."
  disclaimer: "Reference data for engineering. Verify with each plant's annual report before any compliance use."

# =============================================================================
# Province codes: Koshi(1), Madhesh(2), Bagmati(3), Gandaki(4), Lumbini(5),
#                 Karnali(6), Sudurpashchim(7)
# =============================================================================

