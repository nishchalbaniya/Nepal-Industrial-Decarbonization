global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: "nepal-decarb-prod"

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: "nepal-decarb-api"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: "api"
          tier: "backend"

  - job_name: "nepal-decarb-streamlit"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["streamlit:8501"]
        labels:
          service: "streamlit"
          tier: "frontend"

  - job_name: "postgres"
    static_configs:
      - targets: ["db:5432"]
        labels:
          service: "postgres"

  - job_name: "mosquitto"
    static_configs:
      - targets: ["mqtt:1883"]
        labels:
          service: "mqtt"

  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          service: "node-exporter"

  - job_name: "redis"
    static_configs:
      - targets: ["redis:6379"]
        labels:
          service: "redis"
