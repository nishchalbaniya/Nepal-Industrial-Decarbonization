groups:
  - name: nepal-decarb-prod
    rules:
      # API down
      - alert: ApiDown
        expr: up{job="nepal-decarb-api"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "API is down"
          description: "FastAPI service has been down for 2+ minutes"

      - alert: ApiHighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1.0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API p95 latency > 1s"

      # Database
      - alert: DbConnectionsHigh
        expr: pg_stat_activity_count > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Postgres connections > 80"

      - alert: DbDiskSpaceLow
        expr: (node_filesystem_avail_bytes{mountpoint="/var/lib/postgresql"} / node_filesystem_size_bytes) < 0.10
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "DB disk < 10% free"

      # Disk
      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes) < 0.15
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Disk < 15% free on {{ $labels.instance }}"

      # MQTT
      - alert: MqttConnectionsHigh
        expr: mqtt_connections > 500
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "MQTT broker has > 500 connections"

      # Plant-specific emissions (custom business metrics)
      - alert: PlantEmissionsSpike
        expr: plant_emissions_intensity_kg_per_t > plant_baseline_intensity * 1.10
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "Plant {{ $labels.plant_id }} intensity > 110% of baseline"

      - alert: PlantProductionDrop
        expr: plant_production_today < plant_production_30d_avg * 0.7
        for: 4h
        labels:
          severity: warning
        annotations:
          summary: "Plant {{ $labels.plant_id }} production < 70% of 30d avg"

      - alert: SensorOffline
        expr: time() - sensor_last_reading_timestamp > 3600
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Sensor {{ $labels.sensor_id }} offline > 1h"
