# Mosquitto MQTT broker config for nepal_decarb_pro
listener 1883
protocol mqtt

# WebSocket listener (for browser-based IoT dashboards)
listener 9001
protocol websockets

# Persistence
persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information

# Authentication (see scripts/init-mqtt-users.sh)
allow_anonymous false
password_file /mosquitto/config/passwd

# ACL
acl_file /mosquitto/config/acl

# Connection limits
max_connections 1000
max_inflight_messages 200
max_queued_messages 10000
queue_qos0_messages false
