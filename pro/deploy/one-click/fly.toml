# fly.io — alternative free deploy
app = "nepal-decarb-pro"
primary_region = "sin"  # Singapore — closest to Nepal

[build]
  dockerfile = "pro/Dockerfile"

[env]
  ENVIRONMENT = "production"
  LOG_LEVEL = "info"
  LLM_BACKEND = "stub"
  TZ = "Asia/Kathmandu"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.checks]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
