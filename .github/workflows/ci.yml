name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tool-dir:
          - tools/01-baseline-emissions-mrv
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        working-directory: ${{ matrix.tool-dir }}
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest
      - name: Test
        working-directory: ${{ matrix.tool-dir }}
        run: pytest -q
