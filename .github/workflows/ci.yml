name: CI

# WP6 + WP4: GitHub Actions CI for nepal_decarb_pro.
#
# Runs on every push and pull request to the remediation/* branches
# and to the main historical branch. The pipeline:
#   1. Lints with flake8 (non-blocking, per the existing CI)
#   2. Runs pytest on Python 3.11 and 3.12
#   3. (Future) mypy -- strict -- when the WP6 pre-existing failures
#      are fixed
#
# The default branch for this repository is currently
# `day-03-v0.3.2/cooler-structural-fix` (see
# reviews/REMEDIATION_REPORT.md for the rationale). Once the WP0-WP6
# PRs are merged, the default branch should move to `main` (WP4
# follow-up).
#
# Pre-existing test failures documented in
# reviews/GROUND_TRUTH.md: tests/test_sim.py, tests/test_standards.py,
# and 9 other tests (missing optional deps reportlab/matplotlib,
# working-directory assumptions for helm/, docker-compose.yml, etc.).
# The pipeline runs only the modules known to pass cleanly today; the
# list expands as WP6 progresses.

on:
  push:
    branches:
      - main
      - master
      - 'remediation/**'
      - 'day-*/**'
    tags: ['v*']
  pull_request:
    branches:
      - main
      - master
      - 'day-*/**'
      - 'remediation/**'

permissions:
  contents: read

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        working-directory: pro
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov flake8
          pip install fastapi uvicorn reportlab

      - name: Lint (non-blocking)
        working-directory: pro
        run: |
          flake8 nepal_decarb_pro/ --max-line-length=160 --ignore=E501,W503,E402,F401,F403 --exclude=__pycache__,build,dist || echo "Lint warnings (non-blocking)"
        continue-on-error: true

      - name: Run markets tests (WP1 - real methodology assertions)
        working-directory: pro
        run: |
          python -m pytest tests/test_markets.py -v --tb=short

      - name: Run standards scorecard test (WP2 - ISO 14064 part 3 fix)
        working-directory: pro
        run: |
          python -m pytest tests/test_extended.py::test_full_standards_scorecard -v --tb=short

      - name: Run full test suite (non-blocking, pre-existing failures documented)
        working-directory: pro
        # Pre-existing test failures (test_sim.py, test_standards.py, 9
        # others) are documented in reviews/GROUND_TRUTH.md. They are
        # not new in WP1-WP5; they will be fixed in WP6.
        run: |
          python -m pytest tests/ -v --tb=short --maxfail=20 || echo "Pre-existing test failures (non-blocking; see reviews/GROUND_TRUTH.md)"
        continue-on-error: true
