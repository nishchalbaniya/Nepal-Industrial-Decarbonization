name: CI

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - name: Install dependencies
        working-directory: pro
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov flake8
          pip install fastapi uvicorn reportlab
      - name: Lint (non-blocking)
        working-directory: pro
        run: |
          flake8 nepal_decarb_pro/ --max-line-length=160 --ignore=E501,W503,E402,F401,F403 --exclude=__pycache__,build,dist || echo "Lint warnings (non-blocking)"
        continue-on-error: true
      - name: Run tests
        working-directory: pro
        run: |
          python -m pytest tests/ -v --tb=short --maxfail=10
