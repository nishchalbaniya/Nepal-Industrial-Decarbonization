name: CI

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Lint + Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - name: Install dependencies
        working-directory: pro
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"
          pip install pytest pytest-cov flake8
      - name: Lint
        working-directory: pro
        run: |
          # Relaxed lint for fast CI; strict mode available locally
          flake8 nepal_decarb_pro/ --max-line-length=160 --ignore=E501,W503,E402,F401,F403 --exclude=__pycache__,build,dist || echo "Lint warnings (non-blocking)"
      - name: Test
        working-directory: pro
        run: |
          python -m pytest tests/ -v --tb=short --cov=nepal_decarb_pro --cov-report=xml
      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v3
        with:
          file: pro/coverage.xml
          flags: unittests
          name: codecov-umbrella

  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: pro
          file: pro/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/nepal-decarb-pro-api:latest
            ghcr.io/${{ github.repository_owner }}/nepal-decarb-pro-api:${{ github.sha }}
          cache-from: type=gha
      - name: Build & push Streamlit image
        uses: docker/build-push-action@v5
        with:
          context: pro
          file: pro/Dockerfile.streamlit
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/nepal-decarb-pro-streamlit:latest
            ghcr.io/${{ github.repository_owner }}/nepal-decarb-pro-streamlit:${{ github.sha }}
          cache-from: type=gha

  docs:
    name: Build & deploy docs to GitHub Pages
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install + generate
        working-directory: pro
        run: |
          pip install -e ".[all]"
          python scripts/run_pilot.py
      - name: Copy artifacts
        run: |
          mkdir -p docs-site/reports
          cp pro/reports/*.pdf pro/reports/*.png pro/reports/*.json docs-site/reports/ 2>/dev/null || true
          cp pro/explorer.html docs-site/index.html
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
