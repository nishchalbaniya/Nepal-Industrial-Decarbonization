name: Feature Request
description: Suggest a new feature
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? Be specific.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should this work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: context
    attributes:
      label: Additional context
  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      options:
        - label: Affects core MRV engine
        - label: Affects standards compliance
        - label: Affects deployment
        - label: Affects LLM advisor
        - label: Affects UI/dashboard
        - label: Documentation only
