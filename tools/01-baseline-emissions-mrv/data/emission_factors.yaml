# Emission factors for Nepal Cement & Brick MRV tool
# =====================================================
# All values are traceable to peer-reviewed / authoritative sources.
# Units: kg CO2e per unit (indicated in key name)
# Source abbreviations:
#   IPCC2006  = IPCC 2006 Guidelines for National GHG Inventories, Vol. 3 Ch.2
#   IPCC2019  = IPCC 2019 Refinement
#   GCCA      = Global Cement & Concrete Association database
#   DEFRA     = UK DEFRA conversion factors 2024
#   IPPU      = IPCC 2006 Vol.3 Ch.1 (Industrial Processes)
#   Ecoinv3   = ecoinvent v3.10 LCI database
#   NEA2024   = Nepal Electricity Authority Annual Report 2023/24
#   WRI       = World Resources Institute GHG Protocol
# Source column is for documentation; final values verified by Nishchal Baniya, 2026.

meta:
  last_updated: "2026-07-21"
  version: "0.1.0"
  maintainer: "Nishchal Baniya <nishchal.baniya@himalayancarbonnepal.com>"

# =========================================================================
# CEMENT — CLINKER CALCINATION (process emissions)
# =========================================================================
# Stoichiometric CO2 from CaCO3 -> CaO + CO2
# Theoretical = 0.7857 t CO2 / t CaO (or per t clinker ~0.51 t CO2 for OPC)
# Real value depends on CaO content of clinker (typically 65%) and
# the amount of MgCO3 in raw mix (extra ~0.10-0.20% MgO)
clinker:
  # kg CO2 per tonne clinker - process emissions from calcination
  co2_per_t_clinker_process: 0.527
  co2_per_t_clinker_process_source: "IPCC2006 Table 2.2; default for OPC clinker"
  # decomposition
  cao_fraction_clinker: 0.65        # typical OPC clinker CaO content
  mgo_fraction_clinker: 0.015       # typical MgO content
  # mass ratio
  co2_per_t_cao: 0.7857
  co2_per_t_mgo: 1.092
  # raw material factor
  co2_per_t_limestone: 0.4397       # kg CO2 / kg limestone (95% CaCO3)

# =========================================================================
# FUELS — combustion emission factors (kg CO2 / TJ, net calorific value)
# Used in IPCC 2006 Vol.2 Ch.1 stationary combustion
# =========================================================================
fuels:
  coal_bituminous_NP:
    ncvc_gj_per_t: 25.5              # Nepal-imported (mostly Indian Dhansiri)
    ef_kgco2_per_gj: 94.6
    source: "IPCC2006 Table 2.2 (default for bituminous)"
  coal_anthracite_NP:
    ncvc_gj_per_t: 27.0
    ef_kgco2_per_gj: 98.3
    source: "IPCC2006"
  petcoke:
    ncvc_gj_per_t: 32.0
    ef_kgco2_per_gj: 97.5
    source: "IPCC2006; widely used in Nepali cement kilns"
  lignite:
    ncvc_gj_per_t: 11.9
    ef_kgco2_per_gj: 101.0
    source: "IPCC2006"
  natural_gas:
    ncvc_gj_per_t: 48.0
    ef_kgco2_per_gj: 56.1
    source: "IPCC2006 (Nepal: no domestic production; imported LNG soon)"
  diesel:
    ncvc_gj_per_t: 43.0
    ef_kgco2_per_gj: 74.1
    source: "IPCC2006"
  furnace_oil:
    ncvc_gj_per_t: 40.4
    ef_kgco2_per_gj: 77.4
    source: "IPCC2006"
  lpg:
    ncvc_gj_per_t: 47.3
    ef_kgco2_per_gj: 63.1
    source: "IPCC2006"
  biomass_wood:
    ncvc_gj_per_t: 15.6
    ef_kgco2_per_gj: 0.0             # biogenic, but report separately
    source: "IPCC2006 (biogenic CO2, accounted under AFOLU)"
  biomass_rice_husk:
    ncvc_gj_per_t: 13.4
    ef_kgco2_per_gj: 0.0
    source: "IPCC2006; widely available in Nepal Terai"
  biomass_sawdust:
    ncvc_gj_per_t: 16.0
    ef_kgco2_per_gj: 0.0
    source: "IPCC2006"
  biomass_bagasse:
    ncvc_gj_per_t: 9.5
    ef_kgco2_per_gj: 0.0
    source: "IPCC2006"
  tdf_tire:                          # Tire Derived Fuel
    ncvc_gj_per_t: 32.0
    ef_kgco2_per_gj: 85.0
    source: "IPCC2006 (biogenic+fossil split for tires: ~27% biogenic)"
  rdf_municipal:                     # Refuse-Derived Fuel
    ncvc_gj_per_t: 12.0
    ef_kgco2_per_gj: 91.7
    source: "IPCC2006 (assumes 50% biogenic)"

# =========================================================================
# ELECTRICITY — Nepal grid emission factor
# =========================================================================
# Nepal grid is >95% hydropower. CO2 intensity is low but varies seasonally
# (reservoir hydro in dry season) and with India import/export.
grid_electricity_nepal:
  # Operating margin — for projects displacing grid electricity
  om_kgco2_per_kwh: 0.0217          # NEA 2023/24 - based on actual generation mix
  om_source: "NEA2024; calculated as residual mix from hydro/thermal imports"
  # Build margin — for new capacity / additionality
  bm_kgco2_per_kwh: 0.0295          # combined margin (CM = 0.5*OM + 0.5*BM)
  cm_kgco2_per_kwh: 0.0256
  t_and_d_loss_fraction: 0.225      # Nepal: 22.5% technical & commercial losses
  source: "NEA Annual Report 2023/24; CEA India cross-border; CDM ACM0012 default"

# =========================================================================
# BRICK KILN — emission factors and technology benchmarks
# =========================================================================
brick_kiln:
  # Per 1000 bricks, typical coal consumption and emission factors
  # Source: GCCA / WBCSD brick protocols; UNEP brick kiln report; field surveys
  clamp_traditional:
    coal_t_per_1000_bricks: 0.30    # 250-400 kg range
    ef_kgco2_per_1000_bricks: 540.0 # high due to inefficient combustion
    thermal_efficiency: 0.40
    specific_energy_mj_per_brick: 7.65
    notes: "Most common in Nepal (~70% of kilns); highest emissions"
  hoffman:
    coal_t_per_1000_bricks: 0.155
    ef_kgco2_per_1000_bricks: 280.0
    thermal_efficiency: 0.60
    specific_energy_mj_per_brick: 3.95
    notes: "Continuous kiln, common around Kathmandu valley"
  tunnel_kiln:
    coal_t_per_1000_bricks: 0.120
    ef_kgco2_per_1000_bricks: 215.0
    thermal_efficiency: 0.75
    specific_energy_mj_per_brick: 3.05
    notes: "Best Available Technique, but high capex"
  zigzag:
    coal_t_per_1000_bricks: 0.110
    ef_kgco2_per_1000_bricks: 198.0
    thermal_efficiency: 0.70
    specific_energy_mj_per_brick: 2.80
    notes: "Promoted by UNEP/GEF in Nepal; medium capex"
  vertical_shaft:
    coal_t_per_1000_bricks: 0.090
    ef_kgco2_per_1000_bricks: 162.0
    thermal_efficiency: 0.80
    specific_energy_mj_per_brick: 2.30
    notes: "Emerging BAT in South Asia"

# Brick biogenic fuel substitution potential
brick_biomass_substitution:
  rice_husk_j_per_kg: 13.4e6
  sawdust_j_per_kg: 16.0e6
  max_substitution_fraction_technical: 0.30
  max_substitution_fraction_economic: 0.20
  notes: "Higher substitution possible with pre-drying & gasification"

# =========================================================================
# GWP values (AR5, 100-year)
# =========================================================================
gwp:
  co2: 1
  ch4: 28
  n2o: 265
  source: "IPCC AR5 (used in most current voluntary carbon markets)"

# =========================================================================
# Specific energy consumption benchmarks (MJ / t product)
# =========================================================================
sec_benchmarks:
  cement_opc_global_bat:
    sec_mj_per_t_clinker: 2900.0
    sec_mj_per_t_cement: 3300.0
  cement_nepal_average:
    sec_mj_per_t_clinker: 3800.0
    sec_mj_per_t_cement: 4200.0
  brick_global_bat:
    sec_mj_per_1000_bricks: 1700.0
  brick_nepal_average:
    sec_mj_per_1000_bricks: 2550.0

# =========================================================================
# Clinker-to-cement ratio benchmarks
# =========================================================================
clinker_ratio:
  opc: 0.95
  psc_30_pct_slag: 0.65
  ppc_30_pct_flyash: 0.65
  lc3_50_pct_calcined_clay: 0.50
  geopolymer_full: 0.20            # only alkali activation required
  source: "GCCA 2022; WBCSD CSI"

